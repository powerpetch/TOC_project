<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body{background:#0d0d0d;color:#e5e5e5;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
        .wrap{text-align:center}
        .code{font-size:5rem;font-weight:600;color:#f87171;line-height:1}
        .msg{font-size:1rem;color:#666;margin:8px 0 24px}
        .btn{display:inline-block;background:#818cf8;color:#fff;padding:10px 24px;border-radius:6px;font-size:.875rem;text-decoration:none}
        .btn:hover{background:#6366f1}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">500</div>
        <div class="msg">Something went wrong on the server.</div>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
